<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meus Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #1f1f1f);
      color: white;
      text-align: center;
      padding: 30px;
    }

    img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid white;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 25px;
    }

    .btn {
      display: block;
      width: 280px;
      margin: 12px auto;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .shopee { background: #ee4d2d; }
    .shein { background: #000; }
    .mercado { background: #ffe600; color: black; }

    .destaque {
      border: 2px solid #00ffcc;
    }
  </style>
</head>
<body>

  <img src="https://via.placeholder.com/100" alt="foto">

  <h1>🔥 Promoções Top</h1>
  <p>Os melhores achados todos os dias 👇</p>

  <a class="btn shopee destaque" href="SEU_LINK_SHOPEE" target="_blank">
    🧡 OFERTAS SHOPEE
  </a>

  <a class="btn shein" href="SEU_LINK_SHEIN" target="_blank">
    🖤 ROUPAS SHEIN
  </a>

  <a class="btn mercado" href="SEU_LINK_MERCADO" target="_blank">
    💛 MERCADO LIVRE
  </a>

</body>
</html>
