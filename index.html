<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      overflow: hidden;
      background: radial-gradient(circle at bottom, #0b0f2a, #000);
    }

    h1 {
      margin-top: 80px;
    }

    .container {
      position: relative;
      z-index: 2;
    }

    .btn {
      display: block;
      width: 260px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .shopee { background: #ee4d2d; }
    .shein { background: #000; }
    .mercado { background: #ffe600; color: black; }

    /* ⭐ estrelas fixas */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 0;
    }

    /* 🌠 estrela cadente */
    .shooting-star {
      position: absolute;
      width: 2px;
      height: 100px;
      background: linear-gradient(white, transparent);
      opacity: 0.8;
      transform: rotate(45deg);
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translate(0, 0) rotate(45deg);
        opacity: 1;
      }
      100% {
        transform: translate(-800px, 800px) rotate(45deg);
        opacity: 0;
      }
    }

  </style>
</head>
<body>

  <div class="stars">
    <!-- 🌠 várias estrelas -->
    <div class="shooting-star" style="top:10%; left:80%; animation-duration: 3s;"></div>
    <div class="shooting-star" style="top:20%; left:60%; animation-duration: 4s;"></div>
    <div class="shooting-star" style="top:5%; left:30%; animation-duration: 5s;"></div>
    <div class="shooting-star" style="top:40%; left:90%; animation-duration: 3.5s;"></div>
    <div class="shooting-star" style="top:15%; left:50%; animation-duration: 4.5s;"></div>
    <div class="shooting-star" style="top:30%; left:70%; animation-duration: 3.2s;"></div>
  </div>

  <div class="container">
    <h1>🌌 
      Links</h1>

    <a class="btn shopee" href="SEU_LINK_SHOPEE" target="_blank">
      🧡 Shopee
    </a>

    <a class="btn shein" href="SEU_LINK_SHEIN" target="_blank">
      🖤 Shein
    </a>

    <a class="btn mercado" href="SEU_LINK_MERCADO" target="_blank">
      💛 Mercado Livre
    </a>
  </div>

</body>
</html>
